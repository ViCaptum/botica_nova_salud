<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Inicio - Botica Nova Salud</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <main>
        <section>
            <h2>Catálogo y Disponibilidad</h2>
            <p style="color: var(--texto-secundario); margin-bottom: 15px;">Consulta rápida de precios y stock disponible.</p>
            
            <div style="display: flex; gap: 10px; margin-bottom: 20px;">
                <input type="text" id="input-buscar-catalogo" placeholder="Buscar medicamento por nombre o código..." style="flex-grow: 1;">
                <button id="btn-buscar-catalogo"><img src="img/buscar.png" alt="buscar" class="btn-icon">Buscar</button>
            </div>

            <table>
                <thead>
                    <tr>
                        <th>Código</th>
                        <th>Nombre del Producto</th>
                        <th>Tipo</th>
                        <th>Precio (S/)</th>
                        <th>Stock</th>
                    </tr>
                </thead>
                <tbody id="tabla-catalogo-body">
                    <!-- Filas del catálogo inyectadas por JS -->
                </tbody>
            </table>
        </section>
    </main>

    <script src="js/auth.js"></script>
    <script src="js/api.js"></script>
    <script src="js/dashboard.js"></script>
</body>
</html>
