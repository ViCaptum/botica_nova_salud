<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Login - Botica Nova Salud</title>
    <link rel="stylesheet" href="css/style.css">
    <!-- Enlace a Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body style="display: flex; justify-content: center; align-items: center; min-height: 100vh;">
    
    <main class="card">
        <h1 style="color: var(--color-primario);">Nova Salud</h1>
        <h2>Iniciar Sesión</h2>
        
        <form id="form-login" style="text-align: left; margin-top: 20px;">
            <div>
                <label for="username">Usuario:</label>
                <input type="text" id="username" required>
            </div>
            <div>
                <label for="password">Contraseña:</label>
                <input type="password" id="password" required>
            </div>
            
            <p id="msg-error-login" style="color: var(--error); display: none; margin-bottom: 10px;"></p>
            
            <button type="submit" style="width: 100%; margin-top: 10px;">Ingresar</button>
        </form>
    </main>

    <script src="js/auth.js"></script>
    <script src="js/api.js"></script>
</body>
</body>
</html>
