<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Botica Nova Salud</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-slate-50 flex items-center justify-center min-h-screen p-4">
    
    <main class="bg-white p-8 rounded-2xl shadow-xl shadow-slate-200 w-full max-w-md border border-slate-100">
        <div class="text-center mb-8">
            <div class="inline-flex items-center justify-center w-16 h-16 bg-emerald-100 rounded-full mb-4">
                <span class="text-3xl"><img src="img/hospital.png" alt="logo"></span>
            </div>
            <h1 class="text-2xl font-bold text-emerald-600 tracking-tight">Nova Salud</h1>
            <p class="text-slate-500 text-sm mt-1">Gestión Farmacéutica Inteligente</p>
        </div>

        <h2 class="text-xl font-semibold text-slate-800 mb-6 text-center">Iniciar Sesión</h2>
        
        <form id="form-login" class="space-y-5">
            <div>
                <label for="username" class="block text-sm font-medium text-slate-700 mb-1">Nombre de Usuario</label>
                <input type="text" id="username" required
                    class="w-full px-4 py-2.5 bg-slate-50 border border-slate-200 rounded-lg focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500 outline-none transition-all placeholder:text-slate-400"
                    placeholder="Ej: usuario">
            </div>

            <div>
                <label for="password" class="block text-sm font-medium text-slate-700 mb-1">Contraseña</label>
                <input type="password" id="password" required
                    class="w-full px-4 py-2.5 bg-slate-50 border border-slate-200 rounded-lg focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500 outline-none transition-all placeholder:text-slate-400"
                    placeholder="••••••••">
            </div>
            
            <p id="msg-error-login" class="hidden text-sm text-red-600 bg-red-50 p-3 rounded-lg border border-red-100"></p>
            
            <button type="submit" 
                class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-semibold py-3 rounded-lg shadow-lg shadow-emerald-200 transition-all active:scale-[0.98]">
                Entrar al Sistema
            </button>
        </form>

        <footer class="mt-8 text-center">
            <p class="text-xs text-slate-400 uppercase tracking-widest">Botica Nova Salud &copy; 2026</p>
        </footer>
    </main>

    <script src="js/auth.js"></script>
    <script src="js/api.js"></script>
</body>
</html>
