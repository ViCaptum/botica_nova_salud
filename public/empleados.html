<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Gestión de Empleados - Botica Nova Salud</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <main>
        <section>
            <h2>Registrar Nuevo Empleado</h2>
            
            <form id="form-registro" class="form-grid">
                <div>
                    <label for="reg-nombre">Nombres:</label>
                    <input type="text" id="reg-nombre" required>
                </div>
                <div>
                    <label for="reg-apellidos">Apellidos:</label>
                    <input type="text" id="reg-apellidos" required>
                </div>
                <div>
                    <label for="reg-correo">Correo Electrónico:</label>
                    <input type="email" id="reg-correo" required>
                </div>
                <div>
                    <label for="reg-telefono">Teléfono:</label>
                    <input type="text" id="reg-telefono">
                </div>
                <div>
                    <label for="reg-rol">Rol del Empleado:</label>
                    <select id="reg-rol">
                        <option value="1">Administrador</option>
                        <option value="2" selected>Vendedor / Cajero</option>
                    </select>
                </div>
                <div>
                    <label for="reg-username">Nombre de Usuario (Login):</label>
                    <input type="text" id="reg-username" required>
                </div>
                <div>
                    <label for="reg-password">Contraseña temporal:</label>
                    <input type="password" id="reg-password" required>
                </div>
                
                <div class="form-full-width">
                    <p id="msg-error-registro" style="color: var(--error); display: none;"></p>
                    <p id="msg-exito-registro" style="color: var(--exito); display: none;"></p>
                    <button type="submit" style="width: 100%; margin-top: 10px;">Crear Cuenta de Empleado</button>
                </div>
            </form>
        </section>
    </main>

    <script src="js/auth.js"></script>
    <script src="js/api.js"></script>
    <script src="js/empleados.js"></script>
</body>
</html>
