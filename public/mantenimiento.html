<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mantenimiento - Botica Nova Salud</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>body { font-family: 'Inter', sans-serif; }</style>
</head>
<body class="bg-slate-50 min-h-screen">

    <main class="transition-all duration-300 lg:ml-[72px] p-4 md:p-8">
        <header class="max-w-6xl mx-auto mb-8">
            <h2 class="text-3xl font-bold text-slate-800 tracking-tight italic">Gestión de Catálogos</h2>
            <p class="text-slate-500 mt-1">Administra las clasificaciones y marcas para el inventario de la botica.</p>
        </header>

        <div class="max-w-6xl mx-auto grid grid-cols-1 lg:grid-cols-2 gap-8">
            
            <section class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
                <h3 class="flex items-center gap-3 text-lg font-bold text-emerald-600 mb-6 uppercase tracking-tight">
                    🏷️ Categorías
                </h3>
                
                <div class="bg-slate-50 p-4 rounded-xl border border-slate-200 mb-6">
                    <form id="form-nueva-categoria" class="flex flex-col sm:flex-row gap-3 items-end">
                        <div class="flex-grow w-full">
                            <label for="cat-nombre" class="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1">Nombre de Categoría:</label>
                            <input type="text" id="cat-nombre" placeholder="Ej. Analgésicos" required 
                                class="w-full px-4 py-2 bg-white border border-slate-200 rounded-lg focus:ring-2 focus:ring-emerald-500 outline-none text-sm transition-all">
                        </div>
                        <button type="submit" class="w-full sm:w-auto bg-slate-800 hover:bg-slate-900 text-white px-5 py-2 rounded-lg font-bold text-[11px] uppercase tracking-widest transition-all shadow-md active:scale-95 h-[38px]">
                            Agregar
                        </button>
                    </form>
                </div>

                <div class="max-h-[400px] overflow-y-auto rounded-xl border border-slate-200 custom-scrollbar">
                    <table class="w-full text-left border-collapse">
                        <thead class="bg-slate-50 sticky top-0 border-b border-slate-200">
                            <tr>
                                <th class="px-6 py-3 text-[10px] font-black text-slate-400 uppercase tracking-widest">Nombre</th>
                                <th class="px-6 py-3 text-[10px] font-black text-slate-400 uppercase tracking-widest text-center w-24">Acción</th>
                            </tr>
                        </thead>
                        <tbody id="tabla-categorias-mante" class="divide-y divide-slate-100"></tbody>
                    </table>
                </div>
            </section>

            <section class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
                <h3 class="flex items-center gap-3 text-lg font-bold text-emerald-600 mb-6 uppercase tracking-tight">
                    🔬 Laboratorios
                </h3>
                
                <div class="bg-slate-50 p-4 rounded-xl border border-slate-200 mb-6">
                    <form id="form-nuevo-laboratorio" class="flex flex-col sm:flex-row gap-3 items-end">
                        <div class="flex-grow w-full">
                            <label for="lab-nombre" class="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1">Nombre del Laboratorio:</label>
                            <input type="text" id="lab-nombre" placeholder="Ej. Pfizer" required 
                                class="w-full px-4 py-2 bg-white border border-slate-200 rounded-lg focus:ring-2 focus:ring-emerald-500 outline-none text-sm transition-all">
                        </div>
                        <button type="submit" class="w-full sm:w-auto bg-slate-800 hover:bg-slate-900 text-white px-5 py-2 rounded-lg font-bold text-[11px] uppercase tracking-widest transition-all shadow-md active:scale-95 h-[38px]">
                            Agregar
                        </button>
                    </form>
                </div>

                <div class="max-h-[400px] overflow-y-auto rounded-xl border border-slate-200 custom-scrollbar">
                    <table class="w-full text-left border-collapse">
                        <thead class="bg-slate-50 sticky top-0 border-b border-slate-200">
                            <tr>
                                <th class="px-6 py-3 text-[10px] font-black text-slate-400 uppercase tracking-widest">Nombre</th>
                                <th class="px-6 py-3 text-[10px] font-black text-slate-400 uppercase tracking-widest text-center w-24">Acción</th>
                            </tr>
                        </thead>
                        <tbody id="tabla-laboratorios-mante" class="divide-y divide-slate-100"></tbody>
                    </table>
                </div>
            </section>
        </div>
    </main>

    <div id="modal-confirmar-eliminar" class="fixed inset-0 z-[110] hidden items-center justify-center bg-slate-900/60 backdrop-blur-sm p-4">
        <div class="bg-white w-full max-w-sm rounded-2xl shadow-2xl p-6 text-center animate-in fade-in zoom-in duration-200 border border-red-50">
            <div class="w-16 h-16 bg-red-100 text-red-600 rounded-full flex items-center justify-center mx-auto mb-4 text-2xl">⚠️</div>
            <h3 class="text-xl font-bold text-slate-800 mb-2 italic">¿Eliminar registro?</h3>
            <p class="text-slate-500 text-sm mb-6">Esta acción es irreversible y podría afectar productos asociados.</p>
            <div class="flex gap-3">
                <button id="btn-confirmar-delete" class="flex-grow bg-red-600 hover:bg-red-700 text-white font-bold py-3 rounded-xl shadow-lg transition-all text-sm">Si, Eliminar</button>
                <button onclick="cerrarModalEliminar()" class="flex-grow bg-white border border-slate-200 text-slate-500 font-bold py-3 rounded-xl hover:bg-slate-50 transition-all text-sm">Cancelar</button>
            </div>
        </div>
    </div>

    <div id="toast-container" class="fixed bottom-5 right-5 z-[200] flex flex-col gap-3 pointer-events-none"></div>

    <script src="js/auth.js"></script>
    <script src="js/api.js"></script>
    <script src="js/mantenimiento.js"></script>
</body>
</html>
