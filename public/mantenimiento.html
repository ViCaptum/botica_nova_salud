<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Mantenimiento - Botica Nova Salud</title>
    <link rel="stylesheet" href="css/style.css">
    <!-- Enlace a Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <main>
        <div style="margin-bottom: 25px;">
            <h2 style="font-size: 2em; margin-bottom: 5px;">Gestión de Catálogos</h2>
            <p style="color: var(--texto-secundario);">Administra las clasificaciones y marcas para el inventario de la botica.</p>
        </div>
        
        <!-- Usamos tu grilla para dividir la pantalla en dos columnas perfectas -->
        <div class="form-grid" style="align-items: start; gap: 30px;">
            
            <!-- ========================================== -->
            <!-- PANEL CATEGORÍAS -->
            <!-- ========================================== -->
            <section style="margin-bottom: 0; padding: 25px;">
                <h3 style="display: flex; align-items: center; gap: 10px; color: var(--color-primario); margin-bottom: 20px;">
                    🏷️ Categorías
                </h3>
                
                <!-- Formulario compacto (Botón al lado del input) -->
                <div style="background: var(--bg-input); padding: 15px; border-radius: 8px; margin-bottom: 20px; border: 1px solid var(--borde);">
                    <form id="form-nueva-categoria" style="display: flex; gap: 10px; align-items: flex-end; margin-bottom: 0;">
                        <div style="flex-grow: 1; margin-bottom: 0;">
                            <label for="cat-nombre">Nueva Categoría:</label>
                            <input type="text" id="cat-nombre" placeholder="Ej. Analgésicos" required>
                        </div>
                        <button type="submit" style="white-space: nowrap; padding: 12px 15px;">+ Agregar</button>
                    </form>
                </div>

                <div style="max-height: 400px; overflow-y: auto; border: 1px solid var(--borde); border-radius: 8px;">
                    <table style="margin-top: 0; border: none;">
                        <thead>
                            <tr>
                                <th>Nombre</th>
                                <th style="width: 50px; text-align: center;">Acción</th>
                            </tr>
                        </thead>
                        <tbody id="tabla-categorias-mante">
                            <!-- Inyectado por JS -->
                        </tbody>
                    </table>
                </div>
            </section>

            <section style="margin-bottom: 0; padding: 25px;">
                <h3 style="display: flex; align-items: center; gap: 10px; color: var(--color-primario); margin-bottom: 20px;">
                    🔬 Laboratorios
                </h3>
                
                <!-- Formulario compacto -->
                <div style="background: var(--bg-input); padding: 15px; border-radius: 8px; margin-bottom: 20px; border: 1px solid var(--borde);">
                    <form id="form-nuevo-laboratorio" style="display: flex; gap: 10px; align-items: flex-end; margin-bottom: 0;">
                        <div style="flex-grow: 1; margin-bottom: 0;">
                            <label for="lab-nombre">Nuevo Laboratorio:</label>
                            <input type="text" id="lab-nombre" placeholder="Ej. Pfizer" required>
                        </div>
                        <button type="submit" style="white-space: nowrap; padding: 12px 15px;">+ Agregar</button>
                    </form>
                </div>

                <!-- Tabla con scroll interno y cabecera fija -->
                <div style="max-height: 400px; overflow-y: auto; border: 1px solid var(--borde); border-radius: 8px;">
                    <table style="margin-top: 0; border: none;">
                        <thead>
                            <tr>
                                <th>Nombre</th>
                                <th style="width: 50px; text-align: center;">Acción</th>
                            </tr>
                        </thead>
                        <tbody id="tabla-laboratorios-mante">
                            <!-- Inyectado por JS -->
                        </tbody>
                    </table>
                </div>
            </section>

        </div>
    </main>

    <script src="js/auth.js"></script>
    <script src="js/api.js"></script>
    <script src="js/mantenimiento.js"></script>
</body>
</html>
