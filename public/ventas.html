<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Punto de Venta - Botica Nova Salud</title>
    <link rel="stylesheet" href="css/style.css">
    <!-- Enlace a Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

    <main class="pos-layout">
        <div class="pos-main">
            
            <section style="padding: 15px 20px; margin-bottom: 15px;">
                <div style="display: flex; gap: 15px; align-items: flex-end;">
                    <div style="flex-grow: 1; margin-bottom: 0;">
                        <label for="input-dni">DNI del cliente (Opcional):</label>
                        <input type="text" id="input-dni" placeholder="Ej. 77554433" maxlength="8">
                    </div>
                    <button id="btn-buscar-cliente" style="white-space: nowrap;"><img src="img/buscar.png" alt="buscar" class="btn-icon"> Buscar</button>
                </div>

                <div id="seccion-nuevo-cliente" style="display: none; background-color: var(--bg-fondo); padding: 15px; border-radius: 8px; margin-top: 15px; border: 1px dashed var(--color-primario);">
                    <h3 style="color: var(--color-secundario); font-size: 1.1em; margin-bottom: 10px;">Registrar Cliente Rápido</h3>
                    <div class="form-grid">
                        <input type="text" id="nuevo-cli-nombres" placeholder="Nombres">
                        <input type="text" id="nuevo-cli-apellidos" placeholder="Apellidos">
                        <div class="form-full-width" style="display: flex; gap: 10px;">
                            <button id="btn-guardar-cliente-rapido" style="flex-grow: 1;">Guardar y Seleccionar</button>
                            <button id="btn-cancelar-cliente" style="background-color: var(--borde); color: var(--texto-principal);">Cancelar</button>
                        </div>
                    </div>
                </div>
            </section>

            <section style="padding: 20px;">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
                    <h2 style="margin: 0;">Catálogo Rápido</h2>
                    <input type="text" id="input-buscar-prod-venta" placeholder="Buscar por nombre o código..." style="max-width: 300px;">
                </div>
                
                <!-- Aquí JS inyectará las "tarjetas" de los productos -->
                <div id="grid-productos-venta" class="product-grid">
                    <!-- Los productos aparecerán aquí -->
                </div>
            </section>
        </div>

        <aside class="pos-cart-panel">
            <div class="cart-header">
                <h3>Resumen de Venta</h3>
                <p class="cliente-badge">
                    👤 Cliente: <strong id="lbl-nombre-cliente" style="color: var(--color-primario);">Público General</strong>
                </p>
                <input type="hidden" id="cliente-id-seleccionado" value="">
            </div>

            <div class="cart-body" id="contenedor-items-carrito">
                <!-- JS inyecta los items del carrito aquí -->
                <div class="cart-empty-msg">El carrito está vacío</div>
            </div>

            <div class="cart-footer">
                <div style="display: flex; justify-content: space-between; margin-bottom: 15px; font-size: 1.2em;">
                    <span>Total a Pagar:</span>
                    <strong style="color: var(--color-primario); font-size: 1.4em;">S/ <span id="lbl-total-venta">0.00</span></strong>
                </div>
                <button id="btn-procesar-venta" disabled style="width: 100%; padding: 15px; font-size: 1.1em;">Confirmar Venta</button>
            </div>
        </aside>
    </main>

    <script src="js/auth.js"></script>
    <script src="js/api.js"></script>
    <script src="js/ventas.js"></script>
</body>
</html>
