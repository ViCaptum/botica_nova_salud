<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Historial de Ventas - Botica Nova Salud</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    
    <main>
        <section>
            <h2 style="font-size: 2em; margin-bottom: 5px;">Auditoría de Ventas</h2>
            <p style="color: var(--texto-secundario); margin-bottom: 25px;">Consulta el registro histórico de las transacciones realizadas en caja.</p>
            
            <div style="display: flex; gap: 15px; align-items: flex-end; margin-bottom: 25px;">
                <div class="autocomplete-container" style="flex-grow: 1;">
                    <label for="input-buscar-vendedor">Filtrar por Vendedor (Nombre o Username):</label>
                    <input type="text" id="input-buscar-vendedor" placeholder="Escribe para buscar empleado..." autocomplete="off">
                    <div id="lista-empleados" class="autocomplete-list"></div>
                    <input type="hidden" id="vendedor-id-seleccionado">
                </div>
                
                <button id="btn-filtrar-ventas" style="white-space: nowrap; padding: 12px 20px;">
                    <img src="img/buscar.png" alt="buscar" class="btn-icon"> Aplicar Filtro
                </button>
            </div>

            <table>
                <thead>
                    <tr>
                        <th>ID Venta</th>
                        <th>Fecha</th>
                        <th>Vendedor</th>
                        <th>DNI Cliente</th>
                        <th>Total (S/)</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody id="tabla-historial-body">
                    <!-- Filas del historial -->
                </tbody>
            </table>
        </section>
    </main>
    <!-- Modal de Detalles ventas -->
    <div id="modal-detalle" class="modal-overlay" style="display: none;">
        <div class="modal-content" style="max-width: 700px;">
            <h2>Detalle de Venta</h2>

            <div id="info-venta" style="margin-bottom: 15px;"></div>

            <table>
                <thead>
                    <tr>
                        <th>Producto</th>
                        <th>Cant.</th>
                        <th>P. Unitario</th>
                        <th>Subtotal</th>
                    </tr>
                </thead>
                <tbody id="detalle-body"></tbody>
            </table>

            <div style="text-align: right; margin-top: 15px;">
                <button onclick="cerrarModalDetalle()">Cerrar</button>
            </div>
        </div>
    </div>
    <script src="js/auth.js"></script>
    <script src="js/api.js"></script>
    <script src="js/historial.js"></script> 
</body>
</html>
