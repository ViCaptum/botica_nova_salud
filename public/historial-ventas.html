<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Historial de Ventas - Botica Nova Salud</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        /* Estilos del Autocompletado modernizados para combinar con el nuevo CSS */
        .autocomplete-container { position: relative; width: 100%; }
        .autocomplete-list {
            position: absolute; top: 100%; left: 0; right: 0; z-index: 99;
            background-color: var(--bg-superficie); border: 1px solid var(--color-primario);
            border-radius: 8px; max-height: 200px; overflow-y: auto; display: none;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.5); margin-top: 5px;
        }
        .autocomplete-list div { 
            padding: 12px 15px; 
            cursor: pointer; 
            border-bottom: 1px solid var(--borde); 
            color: var(--texto-principal);
            transition: background-color 0.2s;
        }
        .autocomplete-list div:last-child { border-bottom: none; }
        .autocomplete-list div:hover { 
            background-color: var(--color-primario); 
            color: #ffffff; 
            font-weight: 600;
        }
    </style>
</head>
<body>
    
    <main>
        <section>
            <h2 style="font-size: 2em; margin-bottom: 5px;">Auditoría de Ventas</h2>
            <p style="color: var(--texto-secundario); margin-bottom: 25px;">Consulta el registro histórico de las transacciones realizadas en caja.</p>
            
            <div style="display: flex; gap: 15px; align-items: flex-end; margin-bottom: 25px;">
                <div class="autocomplete-container" style="flex-grow: 1;">
                    <label for="input-buscar-vendedor">Filtrar por Vendedor (Nombre o Username):</label>
                    <input type="text" id="input-buscar-vendedor" placeholder="Escribe para buscar empleado..." autocomplete="off">
                    <div id="lista-empleados" class="autocomplete-list"></div>
                    <input type="hidden" id="vendedor-id-seleccionado"> <!-- Aquí guardaremos el ID real para el backend -->
                </div>
                
                <!-- Le agregamos white-space: nowrap para que no salte de línea y un icono -->
                <button id="btn-filtrar-ventas" style="white-space: nowrap; padding: 12px 20px;">
                    🔍 Aplicar Filtro
                </button>
            </div>

            <!-- Tabla sin border="1" para que herede tu diseño premium -->
            <table>
                <thead>
                    <tr>
                        <th>ID Venta</th>
                        <th>Fecha</th>
                        <th>Vendedor</th>
                        <th>DNI Cliente</th>
                        <th>Total (S/)</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody id="tabla-historial-body">
                    <!-- Filas del historial -->
                </tbody>
            </table>
        </section>
    </main>

    <script src="js/auth.js"></script>
    <script src="js/api.js"></script>
    <!-- Corregido: Antes llamaba a inventario.js -->
    <script src="js/historial.js"></script> 
</body>
</html>
