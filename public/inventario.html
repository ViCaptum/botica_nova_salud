<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Inventario - Botica Nova Salud</title>
    <link rel="stylesheet" href="css/style.css">
    <!-- Enlace a Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

    <main>
        <!-- ALERTAS DE STOCK -->
        <section id="alertas-stock" style="margin-bottom: 15px;"></section>
        <!-- Sección de Filtros -->
        <section id="seccion-filtros">
            <input type="text" id="input-buscar" placeholder="Buscar por nombre o código...">
            <select id="select-tipo">
                <option value="todos">Todos los productos</option>
                <option value="generico">Solo Genéricos</option>
                <option value="marca">Solo De Marca</option>
            </select>
            <!-- El botón de buscar queda solo como respaldo visual, la búsqueda será automática -->
            <button id="btn-buscar" style="display: none;">Buscar</button>
            <button id="btn-nuevo-producto" style="display: none;">+ Nuevo Producto</button>
        </section>

        <!-- Tabla de Resultados -->
        <section>
            <table>
                <thead>
                    <tr>
                        <th>Código</th>
                        <th>Nombre</th>
                        <th>Categoría</th>
                        <th>Laboratorio</th>
                        <th>Tipo</th>
                        <th>Precio (S/)</th>
                        <th>Stock</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody id="tabla-productos-body">
                    <!-- JavaScript inyectará las filas aquí -->
                </tbody>
            </table>
        </section>

        <!-- MODAL FLOTANTE PARA CREAR/EDITAR -->
        <div id="modal-producto" class="modal-overlay" style="display: none;">
            <div class="modal-content">
                <h2 id="titulo-formulario" style="margin-bottom: 20px; color: var(--color-primario);">Nuevo Producto</h2>
                
                <form id="form-producto" class="form-grid">
                    <input type="hidden" id="prod-id">
                    
                    <div>
                        <label for="prod-categoria">Categoría:</label>
                        <select id="prod-categoria" required><option value="">Cargando...</option></select>
                    </div>
                    <div>
                        <label for="prod-laboratorio">Laboratorio:</label>
                        <select id="prod-laboratorio" required><option value="">Cargando...</option></select>
                    </div>
                    <div>
                        <label for="prod-codigo">Código de Barras:</label>
                        <input type="text" id="prod-codigo">
                    </div>
                    <div>
                        <label for="prod-nombre">Nombre del Producto:</label>
                        <input type="text" id="prod-nombre" required>
                    </div>
                    <div>
                        <label for="prod-generico">Tipo de Medicamento:</label>
                        <select id="prod-generico">
                            <option value="1">Genérico</option>
                            <option value="0">De Marca</option>
                        </select>
                    </div>
                    <div>
                        <label for="prod-precio">Precio de Venta (S/):</label>
                        <input type="number" step="0.01" id="prod-precio" required>
                    </div>
                    <div>
                        <label for="prod-stock">Stock Actual:</label>
                        <input type="number" id="prod-stock" required>
                    </div>
                    <div>
                        <label for="prod-minimo">Stock Mínimo (Alerta):</label>
                        <input type="number" id="prod-minimo" required>
                    </div>
                    
                    <!-- Botones de Acción ocupando el ancho completo -->
                    <div class="form-full-width" style="display: flex; gap: 15px; margin-top: 15px;">
                        <button type="submit" style="flex-grow: 1;"><img src="img/salvado.png" alt="guardar" class="btn-icon"> Guardar Producto</button>
                        <button type="button" id="btn-cancelar-producto" style="background-color: transparent; border: 1px solid var(--borde); color: var(--texto-principal);">Cancelar</button>
                    </div>
                </form>
            </div>
        </div>
    </main>

    <script src="js/auth.js"></script>
    <script src="js/api.js"></script>
    <script src="js/inventario.js"></script>
</body>
</html>
