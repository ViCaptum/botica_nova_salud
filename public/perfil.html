<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Perfil - Botica Nova Salud</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>body { font-family: 'Inter', sans-serif; }</style>
</head>
<body class="bg-slate-50 min-h-screen">

    <main class="transition-all duration-300 lg:ml-[72px] p-4 md:p-8 flex justify-center items-start pt-8 md:pt-12">
        <div class="w-full max-w-3xl bg-white rounded-3xl shadow-sm border border-slate-200 overflow-hidden">
            
            <!-- Encabezado del Perfil -->
            <div class="bg-slate-50/50 p-8 border-b border-slate-100 flex flex-col items-center">
                <div class="w-24 h-24 bg-emerald-100 rounded-full flex items-center justify-center mb-4 text-4xl shadow-inner overflow-hidden">
                    <img src="img/perfil-del-usuario.png" alt="perfil" class="w-12 h-12 opacity-70">
                </div>
                <h2 id="perfil-nombre" class="text-2xl font-bold text-slate-800 tracking-tight">Cargando...</h2>
                <p class="text-xs font-bold text-emerald-600 uppercase tracking-widest mt-1 bg-emerald-50 px-3 py-1 rounded-full border border-emerald-100">
                    <span id="perfil-rol">...</span>
                </p>
            </div>

            <!-- Formulario de Edición -->
            <form id="form-perfil" class="p-8 space-y-8">
                
                <!-- Sección: Información de Cuenta -->
                <div>
                    <h3 class="text-xs font-black text-slate-400 uppercase tracking-widest border-b border-slate-100 pb-2 mb-5">Información de Cuenta</h3>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div class="space-y-1">
                            <label class="text-[10px] font-black text-slate-500 uppercase tracking-wide">Nombre de Usuario:</label>
                            <input type="text" id="perfil-username-input" required class="w-full px-4 py-2.5 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-emerald-500 outline-none transition-all font-medium text-slate-700">
                        </div>
                        <div class="space-y-1">
                            <label class="text-[10px] font-black text-slate-500 uppercase tracking-wide">Correo Electrónico:</label>
                            <input type="email" id="perfil-correo" readonly class="w-full px-4 py-2.5 bg-slate-100/50 border border-slate-200 rounded-xl text-slate-400 cursor-not-allowed outline-none font-medium">
                        </div>
                        <div class="space-y-1 md:col-span-2">
                            <label class="text-[10px] font-black text-slate-500 uppercase tracking-wide">Teléfono (Celular):</label>
                            <input type="text" id="perfil-telefono" maxlength="9" oninput="this.value = this.value.replace(/[^0-9]/g, '')" class="w-full px-4 py-2.5 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-emerald-500 outline-none transition-all font-medium text-slate-700">
                        </div>
                    </div>
                </div>

                <!-- Sección: Seguridad -->
                <div>
                    <h3 class="text-xs font-black text-slate-400 uppercase tracking-widest border-b border-slate-100 pb-2 mb-5">Seguridad y Acceso</h3>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6 bg-slate-50 p-5 rounded-2xl border border-slate-100">
                        <div class="space-y-1">
                            <label class="text-[10px] font-black text-slate-500 uppercase tracking-wide">Contraseña Actual:</label>
                            <input type="password" id="perfil-pass-actual" placeholder="••••••••" class="w-full px-4 py-2.5 bg-white border border-slate-200 rounded-xl focus:ring-2 focus:ring-emerald-500 outline-none transition-all">
                        </div>
                        <div class="space-y-1">
                            <label class="text-[10px] font-black text-slate-500 uppercase tracking-wide">Nueva Contraseña:</label>
                            <input type="password" id="perfil-pass-nueva" placeholder="Opcional" class="w-full px-4 py-2.5 bg-white border border-slate-200 rounded-xl focus:ring-2 focus:ring-emerald-500 outline-none transition-all">
                        </div>
                    </div>
                    <p class="text-[10px] text-slate-400 mt-2 text-center">Solo llena estos campos si deseas cambiar tu contraseña actual.</p>
                </div>

                <!-- Botón -->
                <button type="submit" class="w-full bg-slate-800 hover:bg-slate-900 text-white font-bold py-4 rounded-xl shadow-lg transition-all flex items-center justify-center gap-2 text-sm uppercase tracking-widest mt-4">
                    <img src="img/salvado.png" alt="guardar" class="w-4 h-4 brightness-0 invert"> Guardar Cambios
                </button>
            </form>
        </div>
    </main>

    <!-- Contenedor Toast para alertas flotantes -->
    <div id="toast-container" class="fixed top-6 right-6 z-[9999] flex flex-col gap-3"></div>

    <script src="js/auth.js"></script>
    <script src="js/api.js"></script>
    <script src="js/perfil.js"></script>
</body>
</html>
