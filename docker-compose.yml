version: '3.8'

services:
  db_botica:
    image: mariadb:10.4
    container_name: db_botica
    restart: always
    environment:
      MARIADB_ROOT_PASSWORD: admin
      MARIADB_DATABASE: botica_db
    ports:
      - "3306:3306"
    volumes:
      - ./database:/docker-entrypoint-initdb.d
    command: --lower_case_table_names=1

  app_botica:
    build: .
    container_name: app_botica
    ports:
      - "3000:3000"
    depends_on:
      - db_botica
    environment:
      DB_HOST: db_botica
      DB_USER: root
      DB_PASSWORD: admin
      DB_NAME: botica_db